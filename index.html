<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗黑游攻略合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:2em;margin-bottom:8px;background:linear-gradient(135deg,#e74c3c,#c0392b,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#888;margin-bottom:40px;font-size:.95em}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:960px;width:100%}
.card{background:#1a1a1a;border-radius:16px;padding:32px 24px;text-decoration:none;color:#e0e0e0;border:1px solid #2a2a2a;transition:all .25s;display:flex;flex-direction:column;gap:12px}
.card:hover{border-color:#e74c3c;transform:translateY(-4px);box-shadow:0 8px 32px rgba(231,76,60,.15)}
.card h2{font-size:1.3em;color:#fff}
.card p{color:#999;font-size:.88em;line-height:1.6}
.card .arrow{color:#e74c3c;font-size:1.2em;align-self:flex-end}
.vn:hover{border-color:#e74c3c}.vn:hover{box-shadow:0 8px 32px rgba(231,76,60,.2)}
.hk:hover{border-color:#c62828}.hk:hover{box-shadow:0 8px 32px rgba(198,40,40,.2)}
.my:hover{border-color:#e94560}.my:hover{box-shadow:0 8px 32px rgba(233,69,96,.2)}
</style>
</head>
<body>
<h1>暗黑游攻略合集</h1>
<p class="sub">越南 · 香港 · 马来西亚 — 三地完整攻略</p>
<div class="cards">
<a class="card vn" href="越南攻略/">
<h2>越南攻略</h2>
<p>胡志明市、河内、岘港、芽庄等城市暗黑游完整指南，包含场所推荐、交通、住宿信息。</p>
<span class="arrow">→</span>
</a>
<a class="card hk" href="香港攻略/">
<h2>香港攻略</h2>
<p>香港暗黑游资料整理，涵盖各区场所、消费指南与注意事项。</p>
<span class="arrow">→</span>
</a>
<a class="card my" href="马来西亚攻略/">
<h2>马来西亚攻略</h2>
<p>吉隆坡、槟城、新山等城市暗黑游指南，含场所、图片与详细路线。</p>
<span class="arrow">→</span>
</a>
</div>
</body>
</html>
